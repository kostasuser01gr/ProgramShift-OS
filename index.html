<!DOCTYPE html>
<html lang="el" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Shift OS</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#b5482b">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Program Shift">
<link rel="stylesheet" href="app/styles.css">
<link rel="stylesheet" href="os/os.css">
<style>
  html,body{margin:0;height:100%;background:var(--paper)}
  #root{height:100vh}
  .boot{height:100vh;display:grid;place-items:center;color:#9a9286;font-family:system-ui;gap:14px}
  .boot .d{width:46px;height:46px;border-radius:13px;background:#b5482b;color:#fff;display:grid;place-items:center;font-family:Georgia,serif;font-size:24px}
</style>
</head>
<body>
<div id="root"><div class="boot"><div class="d">Σ</div><div>Program Shift OS…</div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data + services (plain JS) -->
<script src="app/data.js"></script>
<script src="app/i18n.js"></script>
<script src="os/services.js"></script>

<!-- shared components + existing apps (JSX) -->
<script type="text/babel" src="app/ios-frame.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/owner.jsx"></script>
<script type="text/babel" src="app/employee.jsx"></script>
<script type="text/babel" src="app/manager.jsx"></script>

<!-- OS layer (JSX) -->
<script type="text/babel" src="os/modules.jsx"></script>
<script type="text/babel" src="os/modules2.jsx"></script>
<script type="text/babel" src="os/modules3.jsx"></script>
<script type="text/babel" src="os/modules4.jsx"></script>
<script type="text/babel" src="os/auth.jsx"></script>
<script type="text/babel" src="os/shell.jsx"></script>
<script type="text/babel" src="os/root.jsx"></script>

<script type="text/babel" data-presets="react">
  // ---- PWA: capture install prompt + register service worker ----
  (function () {
    window.__pwaState = 'idle';
    window.addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); window.deferredPrompt = e; window.__pwaState = 'ready'; window.dispatchEvent(new Event('pwa-installable')); });
    window.addEventListener('appinstalled', function () { window.__pwaState = 'done'; window.dispatchEvent(new Event('pwa-installed')); });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () { /* sandbox/file context may block SW — fine */ }); });
    }
  })();

  // seed a couple of notifications so the bell isn't empty on first boot
  (function () {
    if (!window.OS.load('seeded', false)) {
      window.OS.Notify.add({ type: 'publish', title: 'Καλώς ήρθες στο Program Shift OS', desc: 'Όλα τα εργαλεία σε μία πλατφόρμα.', module: 'system' });
      window.OS.Notify.add({ type: 'insight', title: 'Έλεγχος προγράμματος', desc: 'Υπάρχουν ανοιχτές προειδοποιήσεις στον Ιούνιο.', module: 'warnings', priority: 'high' });
      window.OS.save('seeded', true);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.OSRoot));
  })();
</script>
</body>
</html>
